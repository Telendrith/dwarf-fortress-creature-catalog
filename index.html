<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dwarf Fortress Creature Catalog</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚒️</text></svg>">
  <!-- Google Fonts: Cormorant Garamond (Display), Crimson Pro (Prose), JetBrains Mono (Data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  
  <div class="app-body" id="app-body-layout">
    
    <!-- Main Content Area -->
    <div class="main-content">
      <header>
        <h1>Dwarf Fortress Creature Catalog</h1>
        <p>Creature Raws Database</p>
        <div class="dwarven-header-border"></div>
        <div class="stats-summary">
          <div class="stat-pill">Total Creatures: <strong id="total-parsed">-</strong></div>
          <div class="stat-pill">Mod Included: <strong id="total-included" style="color: var(--success-color);">-</strong></div>
          <div class="stat-pill">Excluded: <strong id="total-excluded" style="color: var(--danger-color);">-</strong></div>
        </div>
        <div class="legend-container">
          <span class="legend-title">Beast Classifications</span>
          <div class="legend-items">
            <span class="legend-item"><span class="legend-dot dot-megabeast"></span>Megabeast</span>
            <span class="legend-item"><span class="legend-dot dot-sentient"></span>Sentient</span>
            <span class="legend-item"><span class="legend-dot dot-construct"></span>Construct</span>
            <span class="legend-item"><span class="legend-dot dot-aquatic"></span>Aquatic</span>
            <span class="legend-item"><span class="legend-dot dot-flyer"></span>Flyer</span>
            <span class="legend-item"><span class="legend-dot dot-domestic"></span>Domestic</span>
            <span class="legend-item"><span class="legend-dot dot-wild"></span>Wild</span>
          </div>
        </div>
      </header>

      <!-- Controls Panel -->
      <div class="controls-panel">
        <div class="control-group">
          <label for="search-box">Search Catalog</label>
          <input type="text" id="search-box" class="search-input" placeholder="Search by name, ID, biome, attack form, tissue layer...">
        </div>

        <div class="control-group">
          <label for="filter-inclusion">Mod Embark Status</label>
          <select id="filter-inclusion" class="select-dropdown">
            <option value="all">All Creatures</option>
            <option value="included">Included in Mod (Embarkable)</option>
            <option value="excluded">Excluded / Cut (Non-Embarkable)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="filter-era">Creature Origin</label>
          <select id="filter-era" class="select-dropdown">
            <option value="all">All Origins</option>
            <option value="prehistoric">Prehistoric (Dinosaurs & Extinct)</option>
            <option value="cavern">Cavern Dwellers (Subterranean)</option>
            <option value="surface">Surface Beasts (Modern Wild)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="filter-environment">Environment</label>
          <select id="filter-environment" class="select-dropdown">
            <option value="all">All Environments</option>
            <option value="aquatic">Aquatic (Water-Only)</option>
            <option value="amphibious">Amphibious (Water & Land)</option>
            <option value="land">Terrestrial (Land-Only)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="filter-alignment">Regional Alignment</label>
          <select id="filter-alignment" class="select-dropdown">
            <option value="all">All Alignments</option>
            <option value="good">👼 Good / Holy Biomes</option>
            <option value="evil">👿 Evil / Sinister Biomes</option>
            <option value="savage">🦁 Savage / Untamed Wilds</option>
            <option value="neutral">Neutral / Calm Lands</option>
          </select>
        </div>

        <div class="control-group">
          <label for="filter-capabilities">Special Attributes</label>
          <select id="filter-capabilities" class="select-dropdown">
            <option value="all">All Attributes</option>
            <option value="flier">🪶 Flying Capability</option>
            <option value="trainable">🎓 Trainable (Hunting/War)</option>
            <option value="domestic">🏠 Domestic (Embark-ready)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="filter-sentience">Sentience / Smart</label>
          <select id="filter-sentience" class="select-dropdown">
            <option value="all">Any Intelligence</option>
            <option value="sentient">🧠 Sentient / Learner</option>
            <option value="wild">🐾 Instinctive / Wild</option>
          </select>
        </div>

        <div class="control-group">
          <label for="filter-rarity">Wilderness Rarity</label>
          <select id="filter-rarity" class="select-dropdown">
            <option value="all">All Rarity Levels</option>
            <option value="common">Common (Freq 80+)</option>
            <option value="uncommon">Uncommon (Freq 40-79)</option>
            <option value="rare">Rare (Freq 10-39)</option>
            <option value="ultrarare">Ultra-Rare (Freq 1-9)</option>
            <option value="unique">Special / Non-Spawning</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sort-by">Sort Order</label>
          <select id="sort-by" class="select-dropdown">
            <option value="name-asc">Name (A–Z)</option>
            <option value="name-desc">Name (Z–A)</option>
            <option value="combat-desc">Combat Rating (High to Low)</option>
            <option value="economic-desc">Economic Rating (High to Low)</option>
            <option value="petvalue-desc">Pet Value (High to Low)</option>
            <option value="petvalue-asc">Pet Value (Low to High)</option>
            <option value="size-desc">Body Weight (Largest First)</option>
            <option value="size-asc">Body Weight (Smallest First)</option>
            <option value="maxage-desc">Lifespan (Longest First)</option>
            <option value="maxage-asc">Lifespan (Shortest First)</option>
            <option value="speed-asc">Gait Speed (Fastest First)</option>
            <option value="speed-desc">Gait Speed (Slowest First)</option>
          </select>
        </div>
      </div>

      <!-- Cards Grid -->
      <main id="cards-container" class="creatures-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted); font-size: 1.2rem;">
          ⚒ Compiling creature indices from the raws archives...
        </div>
      </main>
    </div>

    <!-- Detail Drawer Overlay -->
    <div id="detail-drawer" class="drawer-overlay">
      <div class="drawer-content">
        <button class="close-drawer-btn" id="close-drawer">&times;</button>
        <div id="drawer-body">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

  </div> <!-- /app-body -->

</div> <!-- /container -->

<script src="data/creatures_data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
